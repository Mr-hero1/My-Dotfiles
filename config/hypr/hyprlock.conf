source = $HOME/.config/hypr/mocha.conf
$accent = $pink
$accentAlpha = $pinkAlpha
$font = Hack Nerd Font
$font1 = Impact

# GENERAL
general {
  hide_cursor = true
}

# BACKGROUND
background {
  monitor =
  path = $HOME/.config/hypr/background.png
  blur_passes = 0
  color = none
  zindex = -1
}


# TIME
label {
  monitor =
  text = cmd[update:1000] date +"%H"
  color = $text
  font_size = 220
  font_family = $font1
  position = -750, -28
  halign = center
  valign = top
}

label {
  monitor =
  text = cmd[update:1000] date +"%M"
  color = $text
  font_size = 220
  font_family = $font1
  position = -750, -300
  halign = center
  valign = top
}


# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 23
  font_family = $font1
  position = -750, -620
  halign = center
  valign = top
}


# LAYOUT
label {
  monitor =
  text = Layout: $LAYOUT
  color = $text
  font_size = 20
  font_family = $font1
  position = -750, -10
  halign = center
  valign = top
}

shape {
    monitor =
    size = 390, 35
    color =  $surface0  
    rounding = 4
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)
    position = -750, -10
    halign = center
    valign = top
}

# INPUT FIELD
input-field {
  monitor =
  rounding = 6
  size = 360, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $text
  inner_color = $surface0
  font_color = $text
  font_family = $font1
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Welcome </i><span foreground="##$accentAlpha">$USER</span></span>
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = -750, 30
  halign = center
  valign = bottom
}
