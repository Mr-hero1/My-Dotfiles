include=~/.config/MyThemes/f001.ini
[main]
terminal=foot
font=Impact:size=15
use-bold=no
icons-enabled=no

anchor=left
x-margin=0
y-margin=0
width=24
lines=24
horizontal-pad=10
vertical-pad=25
inner-pad=5
line-height=22

keyboard-focus=on-demand 
exit-on-keyboard-focus-loss=yes

[border]
width=0
radius=0
