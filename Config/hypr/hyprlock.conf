source = $HOME/.config/hypr/mocha.conf
$accent = $pink
$accentAlpha = $pinkAlpha
$font = Hack Nerd Font
$font1 = Impact

# GENERAL
general {
  hide_cursor = true
}


# BACKGROUND
background {
  monitor =
  path = $HOME/.config/hypr/background.png
  blur_passes = 0
  color = none
  zindex = 0
}


# LAYOUT
label {
  monitor =
  text = Layout: $LAYOUT
  color = $surface0
  font_size = 25
  font_family = $font1
  position = -718, 100
  halign = center
  valign = bottom
}

# TIME
label {
  monitor =
  text = $TIME
  color = $surface0
  font_size = 150
  font_family = $font1
  position = -718, -20
  halign = center
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $surface0
  font_size = 24
  font_family = $font1
  position = -718, -240
  halign = center
  valign = top
}


# INPUT FIELD
input-field {
  monitor =
  rounding = 6
  size = 360, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $text
  inner_color = $surface0
  font_color = $text
  font_family = $font1
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Welcome </i><span foreground="##$accentAlpha">$USER</span></span>
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = -718, 30
  halign = center
  valign = bottom
}
